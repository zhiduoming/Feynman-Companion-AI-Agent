<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc"/>

  <text x="800" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#111827">费曼伴学智能体 · 技术实现总图</text>
  <text x="800" y="94" text-anchor="middle" font-size="19" fill="#4b5563">以 LangGraph 状态机为中枢，串联用户讲解、RAG 教材依据、LLM 诊断追问、报告生成与数据持久化</text>

  <g filter="url(#shadow)">
  <rect x="590" y="126" width="420" height="86" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.2"/>
<text x="800.0" y="162" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">用户输入</text>
<text x="614" y="198" font-size="19" fill="#374151">讲解文本 / 教材选择 / 知识点选择</text>

  <rect x="385" y="265" width="830" height="220" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2.2"/>
<text x="800.0" y="301" text-anchor="middle" font-size="24" font-weight="700" fill="#9a3412">LangGraph · Agent 编排状态机</text>
<text x="409" y="337" font-size="19" fill="#374151">节点 1：接收讲解 —— 写入会话上下文</text>
<text x="409" y="367" font-size="19" fill="#374151">节点 2：诊断理解 —— 识别概念漏洞、伪理解、缺失点</text>
<text x="409" y="397" font-size="19" fill="#374151">节点 3：追问引导 —— 根据漏洞继续提问，形成多轮回环</text>
<text x="409" y="427" font-size="19" fill="#374151">节点 4：报告生成 —— 汇总诊断、追问、用户回答，输出三维报告</text>

  <rect x="70" y="565" width="300" height="180" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="2.2"/>
<text x="220.0" y="601" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Prompt 约束层</text>
<text x="94" y="637" font-size="19" fill="#374151">分层 System Prompt</text>
<text x="94" y="667" font-size="19" fill="#374151">Few-shot 示例库</text>
<text x="94" y="697" font-size="19" fill="#374151">学科 / 角色 / 评价标准切换</text>
<text x="94" y="727" font-size="19" fill="#374151">控制“小白追问”与评分口径</text>

  <rect x="440" y="565" width="340" height="180" rx="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.2"/>
<text x="610.0" y="601" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">RAG 教材依据层</text>
<text x="464" y="637" font-size="19" fill="#374151">检索相关教材片段</text>
<text x="464" y="667" font-size="19" fill="#374151">截断、重排、拼接上下文</text>
<text x="464" y="697" font-size="19" fill="#374151">把评价锚定到教材原文</text>
<text x="464" y="727" font-size="19" fill="#374151">支持漏洞溯源与追问生成</text>

  <rect x="850" y="565" width="300" height="180" rx="16" fill="#fdf2f8" stroke="#db2777" stroke-width="2.2"/>
<text x="1000.0" y="601" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">结构化输出层</text>
<text x="874" y="637" font-size="19" fill="#374151">Function Calling</text>
<text x="874" y="667" font-size="19" fill="#374151">JSON Schema 约束</text>
<text x="874" y="697" font-size="19" fill="#374151">诊断结果 / 追问 / 报告</text>
<text x="874" y="727" font-size="19" fill="#374151">减少格式漂移与幻觉输出</text>

  <rect x="1220" y="565" width="300" height="180" rx="16" fill="#fefce8" stroke="#ca8a04" stroke-width="2.2"/>
<text x="1370.0" y="601" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">LLM API 网关</text>
<text x="1244" y="637" font-size="19" fill="#374151">DeepSeek-V4 Pro / Flash</text>
<text x="1244" y="667" font-size="19" fill="#374151">备用：通义千问</text>
<text x="1244" y="697" font-size="19" fill="#374151">自然语言理解</text>
<text x="1244" y="727" font-size="19" fill="#374151">追问生成与评估打分</text>

  <rect x="440" y="820" width="340" height="170" rx="16" fill="#ffffff" stroke="#15803d" stroke-width="2.2"/>
<text x="610.0" y="856" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">向量检索底座</text>
<text x="464" y="892" font-size="19" fill="#374151">Chroma 向量数据库</text>
<text x="464" y="922" font-size="19" fill="#374151">BGE-large-zh-v1.5 Embedding</text>
<text x="464" y="952" font-size="19" fill="#374151">BGE-reranker（V2）</text>
<text x="464" y="982" font-size="19" fill="#374151">语义检索 + 结果重排</text>

  <rect x="70" y="820" width="300" height="170" rx="16" fill="#ffffff" stroke="#0e7490" stroke-width="2.2"/>
<text x="220.0" y="856" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">L4 知识处理流水线</text>
<text x="94" y="892" font-size="19" fill="#374151">PDF / 教材解析</text>
<text x="94" y="922" font-size="19" fill="#374151">章节识别与结构切片</text>
<text x="94" y="952" font-size="19" fill="#374151">Embedding 生成</text>
<text x="94" y="982" font-size="19" fill="#374151">教材片段入库</text>

  <rect x="850" y="820" width="300" height="170" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="2.2"/>
<text x="1000.0" y="856" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">知识图谱（V2）</text>
<text x="874" y="892" font-size="19" fill="#374151">Neo4j / 图数据库</text>
<text x="874" y="922" font-size="19" fill="#374151">前驱、后继、并列关系</text>
<text x="874" y="952" font-size="19" fill="#374151">识别碎片化记忆</text>
<text x="874" y="982" font-size="19" fill="#374151">辅助漏洞定位</text>

  <rect x="1220" y="820" width="300" height="170" rx="16" fill="#ffffff" stroke="#475569" stroke-width="2.2"/>
<text x="1370.0" y="856" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">输出与持久化</text>
<text x="1244" y="892" font-size="19" fill="#374151">MySQL：报告、知识点、漏洞库</text>
<text x="1244" y="922" font-size="19" fill="#374151">Redis：会话状态、流程暂停 / 恢复</text>
<text x="1244" y="952" font-size="19" fill="#374151">对象存储：原始教材冷数据</text>
<text x="1244" y="982" font-size="19" fill="#374151">前端：Markdown 报告 + 原文溯源</text>
  </g>

