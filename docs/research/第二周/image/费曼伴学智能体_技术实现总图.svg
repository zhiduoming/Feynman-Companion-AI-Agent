<rect x="299.5" y="482.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="377.5" y="504.0" text-anchor="middle" font-size="17" fill="#111827">读模板</text>
  <line x1="585" y1="485" x2="610" y2="565" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="519.5" y="507.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="597.5" y="529.0" text-anchor="middle" font-size="17" fill="#111827">检索上下文</text>
  <line x1="1015" y1="485" x2="1000" y2="565" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="929.5" y="507.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="1007.5" y="529.0" text-anchor="middle" font-size="17" fill="#111827">强制结构化</text>
  <line x1="1215" y1="375" x2="1370" y2="565" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="1214.5" y="452.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="1292.5" y="474.0" text-anchor="middle" font-size="17" fill="#111827">调用模型</text>
  <line x1="610" y1="745" x2="610" y2="820" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="532.0" y="764.5" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="610.0" y="786.5" text-anchor="middle" font-size="17" fill="#111827">查询向量</text>
  <line x1="370" y1="905" x2="440" y2="905" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="327.0" y="887.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="405.0" y="909.0" text-anchor="middle" font-size="17" fill="#111827">切片入库</text>
  <line x1="780" y1="905" x2="850" y2="905" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="737.0" y="887.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="815.0" y="909.0" text-anchor="middle" font-size="17" fill="#111827">知识关系</text>
  <path d="M 1215 430 C 1292.5 430, 1292.5 820, 1370 820" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="1214.5" y="607.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="1292.5" y="629.0" text-anchor="middle" font-size="17" fill="#111827">结果落库</text>
  <path d="M 850 705 C 1035.0 705, 1035.0 885, 1220 885" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="957.0" y="777.0" width="156" height="30" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="1035.0" y="799.0" text-anchor="middle" font-size="17" fill="#111827">JSON 结果写入</text>

  <path d="M 1045 485 C 1140 520, 1140 248, 915 265" fill="none" stroke="#ea580c" stroke-width="2.6" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <rect x="1015" y="235" width="230" height="34" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1130" y="258" text-anchor="middle" font-size="17" fill="#9a3412">追问回环：诊断 → 追问 → 再讲解</text>

  <rect x="70" y="1035" width="1450" height="48" rx="14" fill="#111827"/>
  <text x="800" y="1066" text-anchor="middle" font-size="20" fill="#ffffff">核心链路：用户讲解 → LangGraph 状态机 → Prompt / RAG / Function Calling / LLM 协同 → 诊断追问闭环 → 三维报告与漏洞沉淀</text>
</svg>
